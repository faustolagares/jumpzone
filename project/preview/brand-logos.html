<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .nm { font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--fg3); }
  .tile { padding:18px 26px; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<div class="card" style="flex-direction:row;align-items:center;gap:30px;flex-wrap:wrap;">
  <div class="col" style="gap:8px;">
    <div class="spec-label">Official lockup — on dark (primary use)</div>
    <div class="tile" style="background:#0A0A0A;border:1px solid var(--line-soft);box-shadow:var(--shadow-glow-sm);"><img src="../assets/logo-jumpzone.png" alt="Jump Zone Studio" style="height:78px;width:auto;"></div>
    <span class="nm">logo-jumpzone.png · transparent</span>
  </div>
  <div class="col" style="gap:8px;">
    <div class="spec-label">On a green surface</div>
    <div class="tile" style="background:var(--energy-green);"><img src="../assets/logo-jumpzone.png" alt="Jump Zone Studio" style="height:78px;width:auto;"></div>
    <span class="nm">clears on energy-green too</span>
  </div>
</div>
</body>
</html>
