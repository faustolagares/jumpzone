<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="gap:10px;">
  <div class="spec-label">Display — Teko · uppercase · italic · skewed</div>
  <div style="font-family:var(--font-display);font-weight:700;font-size:76px;line-height:0.82;text-transform:uppercase;font-style:italic;transform:skewX(-4deg);transform-origin:left;">
    We don't just jump<br><span style="color:var(--energy-green);">we level up.</span>
  </div>
  <div class="row" style="gap:24px;margin-top:6px;">
    <span style="font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:0.12em;color:var(--fg3);">TEKO 700 · ITALIC · -4° SKEW</span>
    <span style="font-family:var(--font-display);font-weight:500;font-size:13px;letter-spacing:0.12em;color:var(--fg3);">TEKO 500 · DISPLAY-SM</span>
  </div>
</div>
</body>
</html>
