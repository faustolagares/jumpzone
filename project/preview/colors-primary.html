<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .sw { display:flex; flex-direction:column; gap:8px; }
  .chip { width:120px; height:72px; border-radius:2px; display:flex; align-items:flex-end; padding:8px; }
  .hex { font-family:var(--font-mono); font-size:11px; letter-spacing:0.04em; }
  .nm { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg3); }
</style>
</head>
<body>
<div class="card">
  <div class="spec-label">Brand accent — one electric green carries everything</div>
  <div class="row" style="gap:14px;">
    <div class="sw"><div class="chip" style="background:#A8FF00;box-shadow:var(--shadow-glow-md);"><span class="hex" style="color:#0A0A0A;">#A8FF00</span></div><span class="nm">energy-green</span></div>
    <div class="sw"><div class="chip" style="background:#C6FF33;"><span class="hex" style="color:#0A0A0A;">#C6FF33</span></div><span class="nm">lime-accent</span></div>
    <div class="sw"><div class="chip" style="background:#F5FF00;"><span class="hex" style="color:#0A0A0A;">#F5FF00</span></div><span class="nm">neon-yellow</span></div>
    <div class="sw"><div class="chip" style="background:#B5FF1A;"><span class="hex" style="color:#0A0A0A;">#B5FF1A</span></div><span class="nm">green-hover</span></div>
    <div class="sw"><div class="chip" style="background:#92DF00;"><span class="hex" style="color:#0A0A0A;">#92DF00</span></div><span class="nm">green-active</span></div>
  </div>
</div>
</body>
</html>
