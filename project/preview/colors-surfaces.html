<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .sw { display:flex; flex-direction:column; gap:8px; }
  .chip { width:108px; height:72px; border-radius:2px; display:flex; align-items:flex-end; padding:8px; border:1px solid var(--line-soft); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--fg2); }
  .nm { font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--fg3); }
</style>
</head>
<body>
<div class="card">
  <div class="spec-label">Surfaces — a near-black ramp, translucent-white hairline borders</div>
  <div class="row" style="gap:12px;">
    <div class="sw"><div class="chip" style="background:#050505;"><span class="hex">#050505</span></div><span class="nm">page-black</span></div>
    <div class="sw"><div class="chip" style="background:#0A0A0A;"><span class="hex">#0A0A0A</span></div><span class="nm">deep-black</span></div>
    <div class="sw"><div class="chip" style="background:#121212;"><span class="hex">#121212</span></div><span class="nm">dark-charcoal</span></div>
    <div class="sw"><div class="chip" style="background:#1A1A1A;"><span class="hex">#1A1A1A</span></div><span class="nm">card-black</span></div>
    <div class="sw"><div class="chip" style="background:rgba(255,255,255,0.06);"><span class="hex">white / 6%</span></div><span class="nm">line-soft</span></div>
    <div class="sw"><div class="chip" style="background:rgba(255,255,255,0.10);"><span class="hex">white / 10%</span></div><span class="nm">line-strong</span></div>
  </div>
</div>
</body>
</html>
