<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="col">
    <div class="spec-label">Body — Inter</div>
    <div style="font-family:var(--font-sans);font-weight:500;font-size:18px;line-height:1.5;color:var(--fg2);max-width:560px;">
      High-energy trampoline workouts. Real results. Strong community. <span style="color:var(--fg3);">Inter 500 · body-lg · 18&nbsp;px.</span>
    </div>
    <div style="font-family:var(--font-sans);font-weight:400;font-size:13px;line-height:1.5;color:var(--fg3);">
      Inter 400 · body-sm · 13&nbsp;px · used for captions, feature descriptions and fine print.
    </div>
  </div>
  <div class="row" style="gap:28px;border-top:1px solid var(--line-soft);padding-top:16px;">
    <div class="col" style="gap:4px;">
      <div class="spec-label">Button label</div>
      <span style="font-family:var(--font-sans);font-weight:900;font-style:italic;text-transform:uppercase;font-size:15px;letter-spacing:0.05em;">Book Your Jump</span>
    </div>
    <div class="col" style="gap:4px;">
      <div class="spec-label">Mono eyebrow</div>
      <span style="font-family:var(--font-mono);font-weight:700;text-transform:uppercase;font-size:12px;letter-spacing:0.25em;color:var(--energy-green);">/// Memberships</span>
    </div>
  </div>
</div>
</body>
</html>
