<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .nm { font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--fg3); }
  .shot { width:100%; height:108px; object-fit:cover; display:block; filter:contrast(1.02); }
  .frame { position:relative; flex:1; min-width:150px; }
  .frame .cap { position:absolute; left:0; bottom:0; right:0; height:50%; background:linear-gradient(to top, #050505, transparent); }
</style>
</head>
<body>
<div class="card" style="gap:12px;">
  <div class="spec-label">Imagery — dark, cinematic, neon-green lit, real people mid-jump</div>
  <div class="row" style="gap:8px;flex-wrap:nowrap;">
    <div class="frame"><img class="shot" src="../assets/class-dance-beat.webp" alt=""><div class="cap"></div></div>
    <div class="frame"><img class="shot" src="../assets/more-than-workout.webp" alt=""><div class="cap"></div></div>
    <div class="frame"><img class="shot" src="../assets/class-hiit-power.webp" alt=""><div class="cap"></div></div>
    <div class="frame"><img class="shot" src="../assets/class-strong-tone.webp" alt=""><div class="cap"></div></div>
  </div>
  <span class="nm">green neon as the light source · high contrast · concert energy</span>
</div>
</body>
</html>
