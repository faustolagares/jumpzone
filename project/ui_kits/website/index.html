<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jump Zone Studio — Website UI Kit</title>
<link rel="icon" type="image/png" href="../../assets/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Teko:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<style>
  .pdot { width:6px; height:6px; border-radius:9999px; background:var(--energy-green);
    box-shadow:0 0 6px rgba(168,255,0,0.6); animation:pulse 1.6s infinite; }
  @keyframes pulse { 50%{opacity:.35;} }
  @keyframes sheetUp { from { transform:translateY(40px); opacity:0; } to { transform:none; opacity:1; } }
  .sheet-in { animation: sheetUp .42s var(--ease-drawer) both; }
  .gallery-arrows { opacity: 0; transition: opacity .15s; }
  .gallery-feature:hover .gallery-arrows { opacity: 1; }
  .gallery-feature img { transition: transform .3s var(--ease-out-strong); }
  .gallery-feature:hover > div:nth-child(2) > img { transform: scale(1.05); }
  /* responsive */
  @media (max-width: 900px){
    .nav-desktop { display:none !important; }
    .nav-mobile { display:flex !important; }
    .hero-bar { grid-template-columns:1fr !important; }
    .feat-grid { grid-template-columns:repeat(2,1fr) !important; }
    .foot-grid { grid-template-columns:1fr !important; }
    .studio-grid { grid-template-columns:1fr !important; }
    .sched-grid { grid-template-columns:1fr !important; }
    .gallery-grid { grid-template-columns:1fr !important; }
    .benefits-grid { grid-template-columns:repeat(3,1fr) !important; gap:28px !important; }
    .ban-div { display:none !important; }
  }
  @media (max-width: 560px){
    .feat-grid { grid-template-columns:1fr !important; }
    .benefits-grid { grid-template-columns:repeat(2,1fr) !important; }
    .fac-grid { grid-template-columns:1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="Buttons.jsx"></script>
<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="HowItWorks.jsx"></script>
<script type="text/babel" src="Benefits.jsx"></script>
<script type="text/babel" src="ScheduleSection.jsx"></script>
<script type="text/babel" src="StudioGallery.jsx"></script>
<script type="text/babel" src="Membership.jsx"></script>

<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="CheckoutModal.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
</body>
</html>
